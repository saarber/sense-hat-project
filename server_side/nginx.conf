#user  nobody;
#Defines which Linux system user will own and run the Nginx server

worker_processes  2;
#Referes to single threaded process. Generally set to be equal to the number of CPUs or cores.

#error_log  logs/error.log; #error_log  logs/error.log  notice;
#Specifies the file where server logs.

#pid        logs/nginx.pid;
#nginx will write its master process ID(PID).

events {
    worker_connections  1024;
    # worker_processes and worker_connections allows you to calculate maxclients value:
    # max_clients = worker_processes * worker_connections
}


http {
    # Hides the Nginx version number
    server_tokens off;
    include       mime.types;
    # anything written in /opt/nginx/conf/mime.types is interpreted as if written inside the http { } block

    default_type  application/octet-stream;
    #

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    # If serving locally stored static files, sendfile is essential to speed up the server,
    # But if using as reverse proxy one can deactivate it

    #tcp_nopush     on;
    # works opposite to tcp_nodelay. Instead of optimizing delays, it optimizes the amount of data sent at once.

    #keepalive_timeout  0;
    keepalive_timeout  65;
    # timeout during which a keep-alive client connection will stay open.


    #gzip  on;
    # tells the server to use on-the-fly gzip compression.
    # HTTPS server
    #
    server {
    if ($host = sensors.example.com) {
        return 301 https://$host$request_uri;
        }

    if ($host = sensors.example.com) {
       return 301 https://www.$host$request_uri;
       }
            listen 80;
         #   server_name sensors.example.com;
        #    return 301 https://sensors.example.com.com$request_uri;



}

    #HTTPS server
    #
    server {
      if ($host = sensors.example.com {
       return 301 https://wwW.$host$request_uri;
       }

        listen       443 ssl;
        server_name  sensors.example.com;
        ssl_certificate /etc/nginx/certs/public-key.pem;
        ssl_certificate_key /etc/nginx/certs/private-key.key;
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        root   /var/www/html;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self';  script-src 'self'; object-src 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "origin";
        add_header X-Frame-Options "DENY" always;
            location / {
        try_files $uri $uri/ /index.html;
        }

    location /sensehat-a/ {
        proxy_pass https://x.x.x.x:8000/;
        proxy_ssl_name sensors.example.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        #add_header 'Access-Control-Allow-Origin' '*';
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify_depth 2;
    }

    location /sensehat-b/ {
        proxy_pass https://x.x.x.x.:8000/;
        proxy_ssl_name sensors.example.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        #add_header 'Access-Control-Allow-Origin' '*';
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify_depth 2;

     }


}

}
